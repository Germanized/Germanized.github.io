<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Germanized Store</title>
  <style>
    /* Global Styles */
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      overflow: hidden;
      position: relative;
      background-color: #111;
      color: #f1f1f1;
    }

    /* Common Styles for Top Bar */
    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #52067d;
      padding: 10px 0;
    }

    .top-bar a {
      color: #b89bff;
      font-size: 22px;
      font-weight: bold;
      text-decoration: none;
      margin: 0 20px;
      transition: color 0.3s;
    }

    .top-bar a:hover {
      color: #fff;
    }

    /* Products Page Specific Styles */
    .products-content {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between; /* Adjust the spacing between items */
      padding: 40px;
    }

    .product-item {
      background-color: #52067d;
      color: #f1f1f1;
      font-size: 16px;
      padding: 20px;
      margin: 10px;
      border-radius: 10px; /* Rounded corners */
      border: 2px solid #fff; /* White outline */
      transition: transform 0.3s, background-color 0.3s;
      cursor: pointer;
      width: calc(50% - 40px); /* Fit 2 items in a row */
      box-sizing: border-box;
    }

    .product-item:hover {
      transform: scale(1.05); /* Enlarge on hover */
      background-color: #6207a2; /* Darker purple on hover */
    }

    .product-image {
      width: 100%;
      height: 150px; /* Adjust the height as per your requirement */
      object-fit: cover; /* Display the image while preserving its aspect ratio */
      border-radius: 8px; /* Rounded corners for image */
    }

    .buy-now-btn {
      background-color: #301934; /* Purple background */
      color: #fff; /* White text */
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .buy-now-btn:hover {
      background-color: #2ecc71; /* Green on hover */
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #52067d;
      padding: 10px 0;
      text-align: center;
      color: #b89bff;
      font-weight: bold;
    }

    /* Dark Mode Styles */
    body.dark-mode {
      background-color: #1a1a1a;
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html">Germanized Store</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact Info</a>
  </div>

  <div class="products-content">
    <h2 style="width: 100%; text-align: center; font-weight: bold;">Available Offers</h2>
    <div class="product-item">
      <img class="product-image" src="offer1.png" alt="Offer 1">
      <h3>Fresh Valorant Account</h3>
      <p>A Fresh Valorant Account</p>
      <button class="buy-now-btn" onclick="window.location.href='buy.html'">Buy Now</button>
    </div>

    <!-- Add more product items here if needed -->
    <!-- Example:
    <div class="product-item">
      <img class="product-image" src="offer2.png" alt="Offer 2">
      <h3>Product 2</h3>
      <p>Description of Product 2</p>
      <button class="buy-now-btn" onclick="window.location.href='buy.html'">Buy Now</button>
    </div>
    -->
  </div>

  <div class="footer">Germanized Store &copy; 2023</div>
</body>
</html>
