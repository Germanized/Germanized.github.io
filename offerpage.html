<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germanized Store - Products</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin&display=swap">
  <style>
    body {
      font-family: 'Libre Franklin', sans-serif;
      margin: 0;
      overflow: hidden;
      position: relative;
      background-color: #fff;
      color: #5b37fc;
    }

    /* Top Tabs Styles */
    .top-tabs {
      display: flex;
      justify-content: center;
      background-color: #5b37fc;
      padding: 10px 0;
    }

    .top-tab {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 0 20px;
      animation: fadeIn 2s ease;
    }

    .top-tab:hover {
      color: #b89bff;
    }

    /* Main Content Styles */
    .main-content {
      padding: 40px;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    .main-content h1 {
      font-size: 36px;
      font-weight: bold;
    }

    .product-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      grid-gap: 40px;
      margin-top: 40px;
    }

    .product {
      background-color: #f3f3f3;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      text-align: center;
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product img {
      max-width: 100%;
    }

    .product-title {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }

    .product-description {
      font-size: 18px;
      margin-top: 10px;
    }

    /* Footer Styles */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #5b37fc;
      padding: 10px 0;
      text-align: center;
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="top-tabs">
    <a href="index.html" class="top-tab">Germanized Store</a>
    <div class="top-tab">Products</div>
    <a href="contact.html" class="top-tab">Contact Info</a>
  </div>

  <div class="main-content">
    <h1>Products</h1>

    <div class="product-list">
      <div class="product">
        <img src="product1.jpg" alt="Product 1">
        <div class="product-title">Product 1</div>
        <div class="product-description">Description for Product 1</div>
      </div>

      <div class="product">
        <img src="product2.jpg" alt="Product 2">
        <div class="product-title">Product 2</div>
        <div class="product-description">Description for Product 2</div>
      </div>

      <!-- Add more products here -->
    </div>
  </div>

  <div class="footer">Germanized Store &copy; 2023</div>
</body>
</html>
