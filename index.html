<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germanized Store</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin&display=swap">
  <style>
    body {
      font-family: 'Libre Franklin', sans-serif;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Styles */
    body::before {
      content: "";
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: linear-gradient(45deg, #5b37fc, #8a1dfc, #9c0fbd, #52067d, #000);
      z-index: -1;
      animation: rotateBackground 40s linear infinite, fadeInOutBackground 20s ease-in-out infinite;
    }

    @keyframes rotateBackground {
      0% {
        transform: rotate(0deg) scale(1);
      }
      100% {
        transform: rotate(360deg) scale(2);
      }
    }

    @keyframes fadeInOutBackground {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    /* Store Title Styles */
    .store-title {
      font-size: 48px;
      text-align: center;
      margin-top: 100px;
      color: #5b37fc;
      font-weight: bold;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Top Tabs Styles */
    .top-tabs {
      display: flex;
      justify-content: center;
      background-color: #5b37fc;
      padding: 10px 0;
    }

    .top-tab {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 0 20px;
      animation: fadeIn 2s ease;
    }

    .top-tab:hover {
      color: #b89bff;
    }

    /* Main Content Styles */
    .main-content {
      padding: 40px;
      color: #5b37fc;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    .main-content h1 {
      font-size: 36px;
      font-weight: bold;
    }

    .main-content p {
      font-size: 24px;
    }

    /* Footer Styles */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #5b37fc;
      padding: 10px 0;
      text-align: center;
      color: #fff;
      font-weight: bold;
    }

    /* Contact Info Styles */
    .contact-info {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      display: none;
      animation: fadeIn 0.5s ease, slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        transform: translate(-50%, -80%);
      }
      to {
        transform: translate(-50%, -50%);
      }
    }
  </style>
</head>
<body>
  <div class="top-tabs">
    <div class="top-tab">Germanized Store</div>
    <div class="top-tab">Products</div>
    <div class="top-tab" onclick="showContactInfo()">Contact Info</div>
  </div>

  <div class="main-content">
    <h1 class="store-title">Welcome to Germanized Store</h1>
    <p>Explore our amazing products and contact us for more information.</p>
  </div>

  <div class="contact-info" id="contactInfo">
    <h2>Contact Info</h2>
    <p>Discord: pronhubstar</p>
    <p>Email: whywontthisworkatall@gmail.com</p>
    <p>Phone: 123-456-7890</p>
    <button onclick="hideContactInfo()">Close</button>
  </div>

  <div class="footer">Germanized Store &copy; 2023</div>

  <script>
    // JavaScript to handle contact info popup
    const contactInfo = document.getElementById("contactInfo");

    const showContactInfo = () => {
      contactInfo.style.display = "block";
    };

    const hideContactInfo = () => {
      contactInfo.style.display = "none";
    };
  </script>
</body>
</html>
