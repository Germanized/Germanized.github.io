<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germanized Store - Contact Info</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin&display=swap">
  <style>
    body {
      font-family: 'Libre Franklin', sans-serif;
      margin: 0;
      overflow: hidden;
      position: relative;
      background-color: #fff;
      color: #5b37fc;
    }

    /* Top Tabs Styles */
    .top-tabs {
      display: flex;
      justify-content: center;
      background-color: #5b37fc;
      padding: 10px 0;
    }

    .top-tab {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 0 20px;
      animation: fadeIn 2s ease;
    }

    .top-tab:hover {
      color: #b89bff;
    }

    /* Main Content Styles */
    .main-content {
      padding: 40px;
      text-align: center;
      animation: fadeIn 2s ease;
    }

    .main-content h1 {
      font-size: 36px;
      font-weight: bold;
    }

    .contact-info {
      margin-top: 40px;
      font-size: 24px;
      animation: fadeInUp 1s ease;
    }

    @keyframes fadeIn
