<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germanized Store</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Homepage Styles */
    body {
      background-color: #111;
      color: #fff;
    }

    .homepage-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .store-title {
      font-size: 48px;
      margin-bottom: 20px;
      color: #b89bff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      font-weight: bold;
    }

    .main-content {
      text-align: center;
      margin-bottom: 40px;
    }

    .main-content p {
      font-size: 20px;
      color: #8a1dfc;
    }

    /* Top Tabs Styles */
    .top-tabs {
      display: flex;
      justify-content: center;
      background-color: #52067d;
      padding: 10px 0;
    }

    .top-tab {
      color: #b89bff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin: 0 20px;
      transition: color 0.3s;
    }

    .top-tab.active {
      color: #fff;
    }

    .top-tab:hover {
      color: #fff;
    }

    /* Footer Styles */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #52067d;
      padding: 10px 0;
      text-align: center;
      color: #b89bff;
      font-weight: bold;
    }

    /* Dark Mode Button Styles */
    .dark-mode-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #5b37fc;
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="top-tabs">
    <a class="top-tab active" href="index.html">Germanized Store</a>
    <a class="top-tab" href="products.html">Products</a>
    <a class="top-tab" href="contact.html">Contact Info</a>
  </div>

  <div class="homepage-content">
    <h1 class="store-title">Welcome to Germanized Store</h1>
    <div class="main-content">
      <p>Explore our amazing products and contact us for more information.</p>
    </div>
  </div>

  <div class="footer">Germanized Store &copy; 2023</div>

  <button class="dark-mode-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>

  <script>
    // JavaScript to handle dark mode toggle
    const toggleDarkMode = () => {
      document.body.classList.toggle("dark-mode");
    };
  </script>
</body>
</html>
