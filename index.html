<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germanized Store</title>
  <style>
    /* Global Styles */
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      overflow: hidden;
      position: relative;
      background-color: #111;
      color: #f1f1f1;
    }

    /* Common Styles for Top Bar */
    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #52067d;
      padding: 10px 0;
    }

    .top-bar a {
      color: #b89bff;
      font-size: 22px; /* Updated font size to 22px */
      font-weight: bold; /* Added font weight bold */
      text-decoration: none;
      margin: 0 20px;
      transition: color 0.3s;
    }

    .top-bar a:hover {
      color: #fff;
    }

    /* Homepage Specific Styles */
    .homepage-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .store-title {
      font-size: 84px;
      margin-bottom: 20px;
      color: #b89bff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      font-weight: bold;
    }

    .main-content {
      text-align: center;
      margin-bottom: 40px;
    }

    .main-content p {
      font-size: 40px;
      color: #8a1dfc;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #52067d;
      padding: 30px 0;
      text-align: center;
      color: #b89bff;
      font-weight: bold;
    }

    

    /* Dark Mode Styles */
    body.dark-mode {
      background-color: #1a1a1a;
      color: #e0e0e0;
    }

    
    /* Animation for the dark mode transition */
    @keyframes backgroundAnimation {
      0% {
        background-color: #111;
      }
      100% {
        background-color: #1a1a1a;
      }
    }

    /* Additional Styling for Products and Contact Pages */
    /* Add specific styles for products.html and contact.html here */

  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html">Germanized Store</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact Info</a>
  </div>

  <div class="homepage-content">
    <h1 class="store-title">Welcome to Germanized Store</h1>
    <div class="main-content">
      <p>Explore our amazing products and contact us for more information.</p>
    </div>
  </div>

  <div class="footer">Germanized Store &copy; 2023</div>

  
  <script>
  </script>
</body>
</html>
