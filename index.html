<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Germanized Store</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin&display=swap">
  <style>
    body {
      font-family: 'Libre Franklin', sans-serif;
      padding: 0;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Styles */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, #5b37fc, #8a1dfc, #9c0fbd, #52067d, #000);
      z-index: -1;
      animation: rotateBackground 20s linear infinite, fadeInOutBackground 20s ease-in-out infinite;
    }

    @keyframes rotateBackground {
      0% {
        transform: rotate(0deg) scale(1);
      }
      100% {
        transform: rotate(360deg) scale(1.5);
      }
    }

    @keyframes fadeInOutBackground {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    /* Store Title Styles */
    .store-title {
      font-size: 36px;
      text-align: center;
      margin-top: 3rem;
      background: linear-gradient(90deg, #b89bff, #5b37fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
      animation: colorChange 4s infinite alternate;
    }

    @keyframes colorChange {
      0%, 100% {
        color: #5b37fc;
      }
      50% {
        color: #b89bff;
      }
    }

    /* Top Tabs Styles */
    .top-tabs {
      display: flex;
      justify-content: space-around;
      background-color: #000;
      padding: 10px 0;
    }

    .top-tab {
      color: #b89bff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .top-tab:hover {
      background-color: #5b37fc;
    }

    /* Main Content Styles */
    .main-content {
      padding: 40px;
      color: #fff;
      text-align: center;
    }

    .main-content h1 {
      font-size: 48px;
    }

    .main-content p {
      font-size: 24px;
    }

    /* Footer Styles */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #000;
      padding: 10px 0;
      text-align: center;
      color: #b89bff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="top-tabs">
    <div class="top-tab">Germanized Store</div>
    <a href="products.html" class="top-tab">Products</a>
    <a href="contact.html" class="top-tab">Contact Info</a>
  </div>

  <div class="main-content">
    <h1 class="store-title">Welcome to Germanized Store</h1>
    <p>Explore our amazing products and contact us for more information.</p>
  </div>

  <div class="footer">Germanized Store &copy; 2023</div>
</body>
</html>
