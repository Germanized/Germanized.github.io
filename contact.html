<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Info - Germanized Store</title>
  <style>
    /* Global Styles */
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      overflow: hidden;
      position: relative;
      background-color: #111;
      color: #f1f1f1;
    }

    /* Common Styles for Top Bar */
    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #52067d;
      padding: 10px 0;
    }

    .top-bar a {
      color: #b89bff;
      font-size: 22px;
      font-weight: bold;
      text-decoration: none;
      margin: 0 20px;
      transition: color 0.3s;
    }

    .top-bar a:hover {
      color: #fff;
    }

    /* Contact Info Page Specific Styles */
    .contact-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .contact-info {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .contact-info span {
      color: #8a1dfc; /* Purple color for specific info */
    }

    .contact-btn {
      background-color: #301934; /* Purple background */
      color: #000; /* Black text */
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .contact-btn:hover {
      background-color: #2ecc71; /* Green on hover */
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #52067d;
      padding: 10px 0;
      text-align: center;
      color: #b89bff;
      font-weight: bold;
    }

    /* Dark Mode Styles */
    body.dark-mode {
      background-color: #1a1a1a;
      color: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html">Germanized Store</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact Info</a>
  </div>

  <div class="contact-content">
    <h2 style="width: 100%; text-align: center; font-weight: bold;">Contact Information</h2>
    <div class="contact-info">
      <p>Email/PayPal: <span>whywontthisworkatall@gmail.com</span></p>
      <p>Discord: <span>pronhubstar</span></p>
    </div>

    

  <div class="footer">Germanized Store &copy; 2023</div>
</body>
</html>
